<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth & Move Master</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-slate-500 font-medium">Loading Wealth Master...</p>
            </div>
        </div>
    </div>

    <!-- The actual App code using JSX (Babel) -->
    <script type="text/babel">
        // --- CONFIG ---
        // Ensure this URL is correct and shared as "Anyone" in Google Apps Script
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxx_JQ3goYCrJJBxezdTetJbFsTpYek7vV0aFVzjefVrPM5oQxE-8L0RuGXCv-uMTEl/exec"; 

        const { useState, useEffect, useMemo, Fragment } = React;
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
            PieChart, Pie, Cell
        } = Recharts;

        // Custom Icon Component to handle Lucide reliably
        const Icon = ({ name, size = 20, className = "" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const iconSvg = window.lucide.icons[name];
                    if (iconSvg) setSvg(iconSvg);
                }
            }, [name]);
            
            return (
                <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [newExpense, setNewExpense] = useState({ description: '', amount: '', category: 'Food' });
            const [errorMessage, setErrorMessage] = useState(null);

            // Run Lucide refresh whenever component updates
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            const fetchData = async () => {
                try {
                    if (typeof google !== 'undefined' && google.script) {
                        google.script.run.withSuccessHandler((data) => {
                            setExpenses(data || []);
                            setLoading(false);
                        }).getExpenses();
                    } else if (SCRIPT_URL) {
                        const response = await fetch(`${SCRIPT_URL}?action=getExpenses`);
                        const data = await response.json();
                        setExpenses(data || []);
                        setLoading(false);
                    }
                } catch (e) {
                    console.error("Fetch error:", e);
                    setErrorMessage("Connection Error: Check SCRIPT_URL and Permissions");
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const handleAddExpense = async () => {
                if (!newExpense.amount || isSaving) return;
                setIsSaving(true);
                try {
                    const params = new URLSearchParams({
                        action: 'addExpense',
                        description: newExpense.description,
                        amount: newExpense.amount,
                        category: newExpense.category
                    });
                    
                    // POST with no-cors for Google Apps Script redirects
                    await fetch(`${SCRIPT_URL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' });
                    
                    // Refresh data after a short delay
                    setTimeout(fetchData, 1500);
                    setNewExpense({ description: '', amount: '', category: 'Food' });
                } catch (e) {
                    console.error("Save error:", e);
                } finally {
                    setIsSaving(false);
                }
            };

            const chartData = [
                { name: 'Apr', amount: 1038 }, { name: 'May', amount: 2115 },
                { name: 'Jun', amount: 3192 }, { name: 'Jul', amount: 4269 },
                { name: 'Aug', amount: 5346 }, { name: 'Sep', amount: 7007 }
            ];

            const totalSpent = expenses.reduce((sum, e) => sum + Number(e.Amount || 0), 0);
            const lifestyleLimit = 320;
            const lifestyleRemaining = Math.max(0, lifestyleLimit - totalSpent);

            if (errorMessage) {
                return (
                    <div className="flex items-center justify-center min-h-screen p-6">
                        <div className="bg-red-50 p-6 rounded-2xl border border-red-200 text-center max-w-sm">
                            <div className="text-red-500 mb-2 font-bold">Error Occurred</div>
                            <p className="text-red-700 text-sm mb-4">{errorMessage}</p>
                            <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Retry Connection</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-24 animate-fade-in">
                    <header className="bg-white p-4 border-b sticky top-0 z-20 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-2 rounded-lg text-white">
                                <i data-lucide="landmark" className="w-5 h-5"></i>
                            </div>
                            <h1 className="font-black text-slate-900 tracking-tighter text-lg">WEALTH MASTER</h1>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] font-bold text-slate-400 uppercase leading-none">Total Savings</p>
                            <p className="text-lg font-black text-blue-600 leading-none mt-1">$500.00</p>
                        </div>
                    </header>

                    <main className="p-4 max-w-4xl mx-auto space-y-6">
                        {activeTab === 'dashboard' && (
                            <Fragment>
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h2 className="font-bold text-slate-800 mb-6 flex items-center justify-between">
                                        Move-In Trajectory
                                        <span className="text-xs font-normal text-slate-400 uppercase tracking-widest">Sept Target</span>
                                    </h2>
                                    <div className="h-64">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={chartData}>
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#94a3b8', fontSize: 12}} />
                                                <YAxis hide />
                                                <Tooltip contentStyle={{borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)'}} />
                                                <Area type="monotone" dataKey="amount" stroke="#2563eb" strokeWidth={4} fill="rgba(37, 99, 235, 0.05)" />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-blue-600 p-6 rounded-3xl text-white shadow-xl shadow-blue-100 h-36 flex flex-col justify-between">
                                        <p className="text-[10px] font-bold uppercase tracking-widest opacity-70">Target Goal</p>
                                        <div>
                                            <p className="text-3xl font-black">$7,000</p>
                                            <p className="text-[10px] font-bold opacity-80 mt-1 uppercase">Ready for NACA</p>
                                        </div>
                                    </div>
                                    <div className="bg-slate-900 p-6 rounded-3xl text-white shadow-xl h-36 flex flex-col justify-between">
                                        <p className="text-[10px] font-bold uppercase tracking-widest opacity-70">Daily Buffer</p>
                                        <div>
                                            <p className="text-3xl font-black">${lifestyleRemaining.toFixed(0)}</p>
                                            <p className="text-[10px] font-bold opacity-80 mt-1 uppercase">Lifestyle Fund</p>
                                        </div>
                                    </div>
                                </div>
                            </Fragment>
                        )}

                        {activeTab === 'daily' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                    <h3 className="font-bold mb-4 flex items-center gap-2">
                                        <i data-lucide="plus" className="text-blue-600 w-5 h-5"></i>
                                        Quick Log Expense
                                    </h3>
                                    <div className="space-y-4">
                                        <input 
                                            placeholder="Description" 
                                            className="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 ring-blue-100"
                                            value={newExpense.description}
                                            onChange={(e) => setNewExpense({...newExpense, description: e.target.value})}
                                        />
                                        <div className="flex gap-3">
                                            <input 
                                                type="number" 
                                                placeholder="0.00" 
                                                className="flex-1 p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 ring-blue-100"
                                                value={newExpense.amount}
                                                onChange={(e) => setNewExpense({...newExpense, amount: e.target.value})}
                                            />
                                            <select 
                                                className="p-4 bg-slate-50 border rounded-2xl outline-none font-bold"
                                                value={newExpense.category}
                                                onChange={(e) => setNewExpense({...newExpense, category: e.target.value})}
                                            >
                                                {['Food', 'Gas', 'Bills', 'Misc'].map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <button 
                                            onClick={handleAddExpense}
                                            disabled={isSaving || !newExpense.amount}
                                            className={`w-full ${isSaving ? 'bg-slate-400' : 'bg-blue-600'} text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100`}
                                        >
                                            {isSaving ? 'SYNCING...' : 'SAVE TO SHEET'}
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
                                        <span className="font-black text-xs text-slate-500 uppercase tracking-widest">Expense History</span>
                                        {loading && <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-blue-600"></div>}
                                    </div>
                                    <div className="divide-y">
                                        {expenses.length === 0 ? (
                                            <p className="p-12 text-center text-slate-400 italic">History is empty.</p>
                                        ) : (
                                            expenses.map((exp, i) => (
                                                <div key={i} className="p-4 flex justify-between items-center hover:bg-slate-50 transition-colors">
                                                    <div>
                                                        <p className="font-bold text-slate-800">{exp.Description || exp.description}</p>
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase">{exp.Date || 'Recent'} • {exp.Category || 'Other'}</p>
                                                    </div>
                                                    <span className="font-black text-slate-900">-${Number(exp.Amount || 0).toFixed(2)}</span>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {(activeTab === 'biweekly' || activeTab === 'monthly') && (
                            <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm text-center py-20">
                                <i data-lucide="shield-check" className="w-12 h-12 text-blue-600 mx-auto mb-4"></i>
                                <h3 className="font-bold text-xl">50/30/20 Plan Active</h3>
                                <p className="text-slate-500 max-w-xs mx-auto mt-2">You are following the $1,600 bi-weekly wealth builder plan.</p>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t p-2 flex gap-1 z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
                        {[
                            { id: 'dashboard', label: 'Home', icon: 'layout-dashboard' },
                            { id: 'daily', label: 'Logs', icon: 'receipt' },
                            { id: 'biweekly', label: 'Budget', icon: 'wallet' },
                            { id: 'monthly', label: 'Growth', icon: 'calendar' }
                        ].map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex-1 flex flex-col items-center gap-1 py-3 rounded-2xl transition-all ${activeTab === tab.id ? 'text-blue-600 bg-blue-50' : 'text-slate-400'}`}
                            >
                                <i data-lucide={tab.icon} className="w-5 h-5"></i>
                                <span className="text-[10px] font-bold uppercase tracking-tighter">{tab.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
