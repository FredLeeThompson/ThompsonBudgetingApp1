<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth & Move Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/javascript">
        // --- PASTE YOUR GOOGLE WEB APP URL HERE ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxx_JQ3goYCrJJBxezdTetJbFsTpYek7vV0aFVzjefVrPM5oQxE-8L0RuGXCv-uMTEl/exec"; 

        const { useState, useEffect, useMemo } = React;
        const { 
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, 
            AreaChart, Area, PieChart, Pie, Cell 
        } = Recharts;
        const { 
            LayoutDashboard, Receipt, Wallet, Calendar, TrendingUp, Landmark, 
            Plus, Save, History, Trash2, Info 
        } = lucide;

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [newExpense, setNewExpense] = useState({ description: '', amount: '', category: 'Food' });

            // Fetch data from Google Sheets
            const fetchData = async () => {
                setLoading(true);
                try {
                    // Method 1: If hosted inside Google Apps Script
                    if (typeof google !== 'undefined') {
                        google.script.run.withSuccessHandler((data) => {
                            setExpenses(data);
                            setLoading(false);
                        }).getExpenses();
                    } 
                    // Method 2: If hosted on GitHub/Cloudflare (External)
                    else if (SCRIPT_URL) {
                        const response = await fetch(SCRIPT_URL + "?action=getExpenses");
                        const data = await response.json();
                        setExpenses(data);
                        setLoading(false);
                    } else {
                        console.warn("No SCRIPT_URL provided. Using mock data.");
                        setExpenses([{ description: 'Mock Expense', amount: 10, category: 'Misc', Date: '1/1/2026' }]);
                        setLoading(false);
                    }
                } catch (e) {
                    console.error("Fetch error:", e);
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const handleAddExpense = async () => {
                if (!newExpense.amount) return;
                setLoading(true);

                if (typeof google !== 'undefined') {
                    google.script.run.withSuccessHandler((updatedData) => {
                        setExpenses(updatedData);
                        setNewExpense({ description: '', amount: '', category: 'Food' });
                        setLoading(false);
                    }).addExpense(newExpense.description, newExpense.amount, newExpense.category);
                } else if (SCRIPT_URL) {
                    const params = new URLSearchParams({
                        action: 'addExpense',
                        description: newExpense.description,
                        amount: newExpense.amount,
                        category: newExpense.category
                    });
                    await fetch(`${SCRIPT_URL}?${params.toString()}`, { method: 'POST' });
                    fetchData(); // Refresh
                    setNewExpense({ description: '', amount: '', category: 'Food' });
                }
            };

            const chartData = [
                { name: 'Apr', amount: 1038 }, { name: 'May', amount: 2115 },
                { name: 'Jun', amount: 3192 }, { name: 'Jul', amount: 4269 },
                { name: 'Aug', amount: 5346 }, { name: 'Sep', amount: 7007 }
            ];

            const totalSpent = expenses.reduce((sum, e) => sum + Number(e.Amount || 0), 0);
            const lifestyleLimit = 320;

            const NavButton = ({ id, label, icon: Icon }) => (
                <button
                    onClick={() => setActiveTab(id)}
                    className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-xl transition-all ${activeTab === id ? 'text-blue-600 bg-white shadow-sm' : 'text-slate-400'}`}
                >
                    <Icon size={20} />
                    <span className="text-[10px] font-bold uppercase">{label}</span>
                </button>
            );

            return React.createElement('div', { className: 'min-h-screen pb-20' }, 
                React.createElement('header', { className: 'bg-white p-4 border-b sticky top-0 z-10 flex justify-between items-center' },
                    React.createElement('div', { className: 'flex items-center gap-2' },
                        React.createElement('div', { className: 'bg-blue-600 p-1.5 rounded-lg text-white' }, React.createElement(Landmark, { size: 18 })),
                        React.createElement('h1', { className: 'font-black text-slate-800' }, 'WEALTH MASTER')
                    ),
                    React.createElement('div', { className: 'text-right' }, 
                        React.createElement('p', { className: 'text-[10px] font-bold text-slate-400 uppercase' }, 'Total Savings'),
                        React.createElement('p', { className: 'text-lg font-black text-blue-600' }, '$500.00')
                    )
                ),
                React.createElement('main', { className: 'p-4 max-w-4xl mx-auto space-y-6' },
                    activeTab === 'dashboard' && React.createElement(React.Fragment, null,
                        React.createElement('div', { className: 'bg-white p-6 rounded-2xl shadow-sm border' },
                            React.createElement('h2', { className: 'font-bold text-slate-800 mb-4' }, 'Move-In Trajectory'),
                            React.createElement('div', { className: 'h-64' },
                                React.createElement(ResponsiveContainer, { width: '100%', height: '100%' },
                                    React.createElement(AreaChart, { data: chartData },
                                        React.createElement(XAxis, { dataKey: 'name', axisLine: false, tickLine: false, tick: {fill: '#94a3b8', fontSize: 12} }),
                                        React.createElement(YAxis, { hide: true }),
                                        React.createElement(Tooltip, { contentStyle: {borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'} }),
                                        React.createElement(Area, { type: 'monotone', dataKey: 'amount', stroke: '#2563eb', strokeWidth: 3, fill: 'rgba(37, 99, 235, 0.1)' })
                                    )
                                )
                            )
                        ),
                        React.createElement('div', { className: 'grid grid-cols-2 gap-4' },
                            React.createElement('div', { className: 'bg-blue-600 p-6 rounded-2xl text-white shadow-lg shadow-blue-100' },
                                React.createElement('p', { className: 'text-[10px] opacity-70 uppercase font-bold tracking-wider' }, 'Sept Target'),
                                React.createElement('p', { className: 'text-2xl font-black' }, '$7,000')
                            ),
                            React.createElement('div', { className: 'bg-slate-900 p-6 rounded-2xl text-white shadow-lg shadow-slate-100' },
                                React.createElement('p', { className: 'text-[10px] opacity-70 uppercase font-bold tracking-wider' }, 'Lifestyle Buffer'),
                                React.createElement('p', { className: 'text-2xl font-black' }, `$${(lifestyleLimit - totalSpent).toFixed(0)}`)
                            )
                        )
                    ),
                    activeTab === 'daily' && React.createElement('div', { className: 'space-y-6' },
                        React.createElement('div', { className: 'bg-white p-6 rounded-2xl border shadow-sm' },
                            React.createElement('h3', { className: 'font-bold mb-4 flex items-center gap-2' }, React.createElement(Plus, { size: 18, className: 'text-blue-600' }), 'Quick Log'),
                            React.createElement('div', { className: 'space-y-4' },
                                React.createElement('input', { 
                                    placeholder: 'Description', 
                                    className: 'w-full p-3 bg-slate-50 border rounded-xl outline-none',
                                    value: newExpense.description,
                                    onChange: (e) => setNewExpense({...newExpense, description: e.target.value})
                                }),
                                React.createElement('div', { className: 'flex gap-2' },
                                    React.createElement('input', { 
                                        type: 'number', 
                                        placeholder: 'Amount', 
                                        className: 'flex-1 p-3 bg-slate-50 border rounded-xl outline-none',
                                        value: newExpense.amount,
                                        onChange: (e) => setNewExpense({...newExpense, amount: e.target.value})
                                    }),
                                    React.createElement('select', { 
                                        className: 'p-3 bg-slate-50 border rounded-xl outline-none',
                                        value: newExpense.category,
                                        onChange: (e) => setNewExpense({...newExpense, category: e.target.value})
                                    },
                                        ['Food', 'Gas', 'Bills', 'Misc'].map(c => React.createElement('option', { key: c }, c))
                                    )
                                ),
                                React.createElement('button', { 
                                    onClick: handleAddExpense,
                                    className: 'w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2' 
                                }, loading ? 'Processing...' : 'Save to Sheet')
                            )
                        ),
                        React.createElement('div', { className: 'bg-white rounded-2xl border shadow-sm overflow-hidden' },
                            expenses.map((exp, i) => React.createElement('div', { key: i, className: 'p-4 flex justify-between border-b last:border-0' },
                                React.createElement('div', null,
                                    React.createElement('p', { className: 'font-bold text-sm' }, exp.Description || exp.description),
                                    React.createElement('p', { className: 'text-[10px] text-slate-400' }, exp.Date || 'Recent')
                                ),
                                React.createElement('span', { className: 'font-bold text-slate-700' }, `-$${Number(exp.Amount || exp.amount).toFixed(2)}`)
                            ))
                        )
                    )
                ),
                React.createElement('nav', { className: 'fixed bottom-0 left-0 right-0 bg-slate-100 p-2 border-t flex gap-2' },
                    React.createElement(NavButton, { id: 'dashboard', label: 'Home', icon: LayoutDashboard }),
                    React.createElement(NavButton, { id: 'daily', label: 'Logs', icon: Receipt }),
                    React.createElement(NavButton, { id: 'biweekly', label: 'Budget', icon: Wallet }),
                    React.createElement(NavButton, { id: 'monthly', label: 'Growth', icon: Calendar })
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
