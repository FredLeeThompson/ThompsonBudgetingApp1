<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth & Move Master</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-slate-500 font-medium">Opening Wealth Master...</p>
            </div>
        </div>
    </div>

    <!-- The actual App code using JSX (Babel) -->
    <script type="text/babel">
        // --- CONFIG ---
        // Replace with your actual Google Apps Script Web App URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxx_JQ3goYCrJJBxezdTetJbFsTpYek7vV0aFVzjefVrPM5oQxE-8L0RuGXCv-uMTEl/exec"; 

        const { useState, useEffect, useMemo, Fragment } = React;
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer
        } = Recharts;

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [newExpense, setNewExpense] = useState({ description: '', amount: '', category: 'Food' });
            const [errorMessage, setErrorMessage] = useState(null);

            // Refresh Lucide icons after every render
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const fetchData = async () => {
                try {
                    setLoading(true);
                    if (typeof google !== 'undefined' && google.script) {
                        // Running inside Google Apps Script environment
                        google.script.run.withSuccessHandler((data) => {
                            setExpenses(data || []);
                            setLoading(false);
                        }).getExpenses();
                    } else if (SCRIPT_URL && SCRIPT_URL.length > 10) {
                        // Running externally (GitHub/Cloudflare)
                        const response = await fetch(`${SCRIPT_URL}?action=getExpenses`);
                        if (!response.ok) throw new Error("Sheet connection failed");
                        const data = await response.json();
                        setExpenses(data || []);
                        setLoading(false);
                    } else {
                        // Fallback mock data if no URL is provided
                        console.warn("No SCRIPT_URL provided. Showing demo data.");
                        setExpenses([
                            { Description: 'Rent Deposit', Amount: 500, Category: 'Bills', Date: '3/30/2026' },
                            { Description: 'Gym Membership', Amount: 35, Category: 'Misc', Date: '3/28/2026' }
                        ]);
                        setLoading(false);
                    }
                } catch (e) {
                    console.error("Fetch error:", e);
                    setErrorMessage("Unable to connect to Google Sheets. Verify your SCRIPT_URL and check if it is shared with 'Anyone'.");
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const handleAddExpense = async () => {
                if (!newExpense.amount || isSaving) return;
                setIsSaving(true);
                try {
                    const params = new URLSearchParams({
                        action: 'addExpense',
                        description: newExpense.description,
                        amount: newExpense.amount,
                        category: newExpense.category
                    });
                    
                    if (typeof google !== 'undefined' && google.script) {
                        google.script.run.withSuccessHandler((updatedData) => {
                            setExpenses(updatedData || []);
                            setNewExpense({ description: '', amount: '', category: 'Food' });
                            setIsSaving(false);
                        }).addExpense(newExpense.description, newExpense.amount, newExpense.category);
                    } else {
                        // External POST
                        await fetch(`${SCRIPT_URL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' });
                        setTimeout(fetchData, 1200); // Wait for GAS to update
                        setNewExpense({ description: '', amount: '', category: 'Food' });
                        setIsSaving(false);
                    }
                } catch (e) {
                    console.error("Save error:", e);
                    setIsSaving(false);
                }
            };

            const chartData = [
                { name: 'Apr', amount: 1038 }, { name: 'May', amount: 2115 },
                { name: 'Jun', amount: 3192 }, { name: 'Jul', amount: 4269 },
                { name: 'Aug', amount: 5346 }, { name: 'Sep', amount: 7007 }
            ];

            const totalSpent = expenses.reduce((sum, e) => sum + Number(e.Amount || 0), 0);
            const lifestyleLimit = 320;
            const lifestyleRemaining = Math.max(0, lifestyleLimit - totalSpent);

            if (errorMessage) {
                return (
                    <div className="flex items-center justify-center min-h-screen p-6 bg-slate-50">
                        <div className="bg-white p-8 rounded-3xl border border-red-100 text-center shadow-xl max-w-sm">
                            <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="alert-circle" className="w-8 h-8"></i>
                            </div>
                            <h3 className="font-bold text-slate-900 text-lg mb-2">Connection Issue</h3>
                            <p className="text-slate-500 text-sm mb-6 leading-relaxed">{errorMessage}</p>
                            <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white font-bold py-3 rounded-xl">Try Again</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-24 animate-fade-in flex flex-col">
                    <header className="bg-white p-4 border-b sticky top-0 z-20 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-2 rounded-xl text-white">
                                <i data-lucide="landmark" className="w-5 h-5"></i>
                            </div>
                            <h1 className="font-black text-slate-900 tracking-tighter text-lg">WEALTH MASTER</h1>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Total Savings</p>
                            <p className="text-lg font-black text-blue-600 leading-none mt-1">$500.00</p>
                        </div>
                    </header>

                    <main className="flex-1 p-4 max-w-4xl mx-auto w-full space-y-6">
                        {activeTab === 'dashboard' && (
                            <Fragment>
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                                    <h2 className="font-bold text-slate-800 mb-6 flex items-center justify-between">
                                        Move-In Trajectory
                                        <span className="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-full uppercase tracking-widest">Sept Target</span>
                                    </h2>
                                    <div className="h-64">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={chartData}>
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#94a3b8', fontSize: 12}} />
                                                <YAxis hide />
                                                <Tooltip 
                                                    contentStyle={{borderRadius: '20px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)'}}
                                                    cursor={{ stroke: '#cbd5e1', strokeWidth: 1 }}
                                                />
                                                <Area type="monotone" dataKey="amount" stroke="#2563eb" strokeWidth={4} fill="rgba(37, 99, 235, 0.05)" />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="bg-blue-600 p-6 rounded-[2.5rem] text-white shadow-xl shadow-blue-100 h-40 flex flex-col justify-between">
                                        <p className="text-[10px] font-bold uppercase tracking-widest opacity-70">Savings Goal</p>
                                        <div>
                                            <p className="text-4xl font-black tracking-tighter">$7,000</p>
                                            <p className="text-[10px] font-bold opacity-80 mt-1 uppercase tracking-wider">Ready for NACA</p>
                                        </div>
                                    </div>
                                    <div className="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-xl h-40 flex flex-col justify-between">
                                        <p className="text-[10px] font-bold uppercase tracking-widest opacity-70">Lifestyle Buffer</p>
                                        <div>
                                            <p className="text-4xl font-black tracking-tighter">${lifestyleRemaining.toFixed(0)}</p>
                                            <p className="text-[10px] font-bold opacity-80 mt-1 uppercase tracking-wider">Remaining this period</p>
                                        </div>
                                    </div>
                                </div>
                            </Fragment>
                        )}

                        {activeTab === 'daily' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                    <h3 className="font-bold mb-4 flex items-center gap-2">
                                        <i data-lucide="plus-circle" className="text-blue-600 w-5 h-5"></i>
                                        Log New Expense
                                    </h3>
                                    <div className="space-y-4">
                                        <input 
                                            placeholder="Where did you spend?" 
                                            className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 ring-blue-500/10 transition-all font-medium"
                                            value={newExpense.description}
                                            onChange={(e) => setNewExpense({...newExpense, description: e.target.value})}
                                        />
                                        <div className="flex gap-3">
                                            <input 
                                                type="number" 
                                                placeholder="0.00" 
                                                className="flex-1 p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 ring-blue-500/10 transition-all font-bold text-lg"
                                                value={newExpense.amount}
                                                onChange={(e) => setNewExpense({...newExpense, amount: e.target.value})}
                                            />
                                            <select 
                                                className="p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold text-slate-600 cursor-pointer"
                                                value={newExpense.category}
                                                onChange={(e) => setNewExpense({...newExpense, category: e.target.value})}
                                            >
                                                {['Food', 'Gas', 'Bills', 'Misc'].map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <button 
                                            onClick={handleAddExpense}
                                            disabled={isSaving || !newExpense.amount}
                                            className={`w-full ${isSaving ? 'bg-slate-300' : 'bg-blue-600'} text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 uppercase tracking-widest`}
                                        >
                                            {isSaving ? 'Syncing...' : 'Save Transaction'}
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                                    <div className="p-5 bg-slate-50 border-b flex justify-between items-center">
                                        <span className="font-black text-[10px] text-slate-500 uppercase tracking-[0.2em]">Expense History</span>
                                        {loading && <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-blue-600"></div>}
                                    </div>
                                    <div className="divide-y divide-slate-50 max-h-[500px] overflow-y-auto">
                                        {expenses.length === 0 && !loading ? (
                                            <div className="p-16 text-center">
                                                <i data-lucide="inbox" className="w-10 h-10 text-slate-200 mx-auto mb-3"></i>
                                                <p className="text-slate-400 text-sm italic">No history found.</p>
                                            </div>
                                        ) : (
                                            expenses.map((exp, i) => (
                                                <div key={i} className="p-5 flex justify-between items-center hover:bg-slate-50 transition-colors">
                                                    <div>
                                                        <p className="font-bold text-slate-800">{exp.Description || exp.description}</p>
                                                        <p className="text-[10px] font-bold text-slate-400 uppercase mt-0.5 tracking-tight">
                                                            {exp.Date || 'Recently'} • {exp.Category || 'General'}
                                                        </p>
                                                    </div>
                                                    <span className="font-black text-slate-900 text-lg">-${Number(exp.Amount || 0).toFixed(2)}</span>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {(activeTab === 'biweekly' || activeTab === 'monthly') && (
                            <div className="bg-white p-12 rounded-3xl border border-slate-200 shadow-sm text-center animate-fade-in">
                                <div className="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i data-lucide="shield-check" className="w-10 h-10"></i>
                                </div>
                                <h3 className="font-bold text-xl text-slate-900 mb-2 underline decoration-blue-500 decoration-4 underline-offset-4 tracking-tight">50/30/20 Plan Active</h3>
                                <p className="text-slate-500 text-sm max-w-xs mx-auto leading-relaxed">
                                    Your bi-weekly income of **$1,600** is being tracked against your wealth goals. 
                                    Continue logging daily expenses to maintain your buffer.
                                </p>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-2 flex gap-1 z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
                        {[
                            { id: 'dashboard', label: 'Home', icon: 'layout-dashboard' },
                            { id: 'daily', label: 'Logs', icon: 'receipt' },
                            { id: 'biweekly', label: 'Budget', icon: 'wallet' },
                            { id: 'monthly', label: 'Growth', icon: 'trending-up' }
                        ].map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex-1 flex flex-col items-center gap-1 py-3 rounded-2xl transition-all duration-300 ${activeTab === tab.id ? 'text-blue-600 bg-blue-50 scale-95' : 'text-slate-400 opacity-60'}`}
                            >
                                <i data-lucide={tab.icon} className="w-5 h-5"></i>
                                <span className="text-[10px] font-bold uppercase tracking-tighter">{tab.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
