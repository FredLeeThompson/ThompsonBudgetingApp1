<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow | Thompson Budgeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loader { border-top-color: #6366f1; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(8px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-12">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center transition-all duration-300">
        <div class="loader rounded-full border-4 border-slate-200 h-14 w-14 mb-4"></div>
        <p class="text-indigo-600 font-bold tracking-wide animate-pulse uppercase">Connecting to Google Script...</p>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-6 md:py-10">
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Thompson Budgeting</h1>
                <p class="text-slate-500 font-medium tracking-tight">External Sheet Integration</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="refreshData()" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                </button>
                <div class="flex items-center gap-2 px-3 py-1.5 bg-indigo-50 rounded-full border border-indigo-100">
                    <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-black text-indigo-700 uppercase tracking-widest">External Link</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-card p-6 rounded-3xl shadow-sm border-l-8 border-emerald-500">
                <span class="text-xs font-black uppercase tracking-widest text-slate-400 block mb-2">Monthly Income</span>
                <h2 id="total-income" class="text-3xl font-black text-slate-800 tracking-tight">$0.00</h2>
            </div>
            <div class="glass-card p-6 rounded-3xl shadow-sm border-l-8 border-rose-500">
                <span class="text-xs font-black uppercase tracking-widest text-slate-400 block mb-2">Total Bills</span>
                <h2 id="total-bills" class="text-3xl font-black text-slate-800 tracking-tight">$0.00</h2>
            </div>
            <div id="balance-card" class="glass-card p-6 rounded-3xl shadow-sm border-l-8 border-indigo-500 transition-all duration-500">
                <span class="text-xs font-black uppercase tracking-widest text-slate-400 block mb-2">Net Remaining</span>
                <h2 id="net-balance" class="text-3xl font-black text-slate-800 tracking-tight">$0.00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <div class="lg:col-span-4">
                <div class="glass-card p-8 rounded-3xl shadow-lg sticky top-6">
                    <h3 class="text-xl font-black mb-8 flex items-center gap-3">Log Transaction</h3>
                    <form id="transaction-form" class="space-y-6">
                        <div class="grid grid-cols-2 gap-3">
                            <label class="cursor-pointer"><input type="radio" name="type" value="income" class="peer sr-only" checked><div class="py-3 text-center rounded-2xl border-2 border-slate-100 peer-checked:border-emerald-500 peer-checked:bg-emerald-50 peer-checked:text-emerald-700 font-bold text-sm">Income</div></label>
                            <label class="cursor-pointer"><input type="radio" name="type" value="bill" class="peer sr-only"><div class="py-3 text-center rounded-2xl border-2 border-slate-100 peer-checked:border-rose-500 peer-checked:bg-rose-50 peer-checked:text-rose-700 font-bold text-sm">Bill</div></label>
                        </div>
                        <input type="text" id="description" required placeholder="Description" class="w-full px-5 py-4 rounded-2xl border border-slate-200">
                        <input type="number" id="amount" required step="0.01" placeholder="Amount ($)" class="w-full px-5 py-4 rounded-2xl border border-slate-200">
                        <select id="category" class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-white">
                            <option value="General">General</option>
                        </select>
                        <input type="date" id="date" required class="w-full px-5 py-4 rounded-2xl border border-slate-200">
                        <button type="submit" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:bg-indigo-600 transition-all">Sync to Sheet</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-card rounded-3xl shadow-sm overflow-hidden flex flex-col min-h-[500px]">
                    <div class="p-8 border-b border-slate-100"><h3 class="text-xl font-black">History</h3><p id="entry-count" class="text-sm text-slate-400">Loading...</p></div>
                    <ul id="transaction-list" class="divide-y divide-slate-50"></ul>
                    <div id="empty-state" class="hidden py-32 text-center text-slate-300"><p class="text-lg font-bold">No Records Found</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-all duration-500 z-50 font-bold">Transaction logged!</div>

    <script>
        /**
         * PASTE YOUR DEPLOYED URL HERE
         */
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxpqBU9SBGdI8sai8RntP393uhVdKOSEYJwSY2oZfH5TZjw1VhDsy7Ag8YnYWP75DxS/exec';

        const form = document.getElementById('transaction-form');
        const list = document.getElementById('transaction-list');
        const loader = document.getElementById('loading-overlay');
        const catSelect = document.getElementById('category');
        const toast = document.getElementById('toast');

        let state = { transactions: [], categories: [] };

        function showLoader(show) {
            loader.classList.toggle('opacity-0', !show);
            loader.classList.toggle('pointer-events-none', !show);
        }

        /**
         * FIXED Connection Handler (JSONP method)
         */
        function scriptCall(action, payload = null) {
            return new Promise((resolve, reject) => {
                const callbackName = 'callback_' + Math.round(100000 * Math.random());
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    if (data.error) reject(data.error);
                    else resolve(data);
                };

                const script = document.createElement('script');
                let url = SCRIPT_URL + '?action=' + action + '&callback=' + callbackName;
                if (payload) url += '&data=' + encodeURIComponent(JSON.stringify(payload));
                
                script.src = url;
                script.onerror = () => reject('Network Error');
                document.body.appendChild(script);
            });
        }

        async function refreshData() {
            showLoader(true);
            try {
                state = await scriptCall('getData');
                render();
            } catch(e) { console.error(e); }
            finally { showLoader(false); }
        }

        function render() {
            // Stats
            const income = state.transactions.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0);
            const bills = state.transactions.filter(t => t.type === 'bill').reduce((s, t) => s + Number(t.amount), 0);
            document.getElementById('total-income').textContent = formatUSD(income);
            document.getElementById('total-bills').textContent = formatUSD(bills);
            document.getElementById('net-balance').textContent = formatUSD(income - bills);
            document.getElementById('entry-count').textContent = `${state.transactions.length} entries on file`;

            // Categories
            catSelect.innerHTML = '<option value="General">General</option>';
            state.categories.forEach(c => catSelect.innerHTML += `<option value="${c}">${c}</option>`);

            // List
            list.innerHTML = '';
            document.getElementById('empty-state').classList.toggle('hidden', state.transactions.length > 0);
            [...state.transactions].reverse().forEach(t => {
                const isIncome = t.type === 'income';
                list.innerHTML += `
                    <li class="flex items-center justify-between p-6 hover:bg-slate-50 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center ${isIncome ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">${isIncome ? '↑' : '↓'}</div>
                            <div><p class="font-bold">${t.description}</p><p class="text-xs text-slate-400 font-bold uppercase">${t.category} • ${new Date(t.date).toLocaleDateString()}</p></div>
                        </div>
                        <div class="flex items-center gap-6">
                            <span class="font-black text-lg ${isIncome ? 'text-emerald-600' : 'text-rose-600'}">${isIncome ? '+' : '-'}${formatUSD(t.amount)}</span>
                            <button onclick="handleDelete('${t.id}')" class="text-slate-300 hover:text-rose-600">✕</button>
                        </div>
                    </li>`;
            });
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                type: form.querySelector('input[name="type"]:checked').value,
                description: document.getElementById('description').value,
                amount: parseFloat(document.getElementById('amount').value),
                category: catSelect.value,
                date: document.getElementById('date').value
            };
            showLoader(true);
            state = await scriptCall('addTransaction', payload);
            render();
            form.reset();
            document.getElementById('date').valueAsDate = new Date();
            showLoader(false);
            showToast("Synced!");
        };

        window.handleDelete = async (id) => {
            if (!confirm('Remove entry?')) return;
            showLoader(true);
            state = await scriptCall('deleteTransaction', { id });
            render();
            showLoader(false);
        };

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 2000);
        }

        function formatUSD(val) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val); }

        window.onload = () => {
            document.getElementById('date').valueAsDate = new Date();
            if(!SCRIPT_URL.includes('PASTE')) refreshData();
            else alert("Set SCRIPT_URL first!");
        };
    </script>
</body>
</html>
